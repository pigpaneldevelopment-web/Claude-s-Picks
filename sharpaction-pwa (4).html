  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}

/* Header */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 14px;
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.logo {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
}
.logo span { color: var(--accent); }
.updated {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}
.refresh-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  -webkit-appearance: none;
}
.refresh-btn:active { opacity: 0.7; }

/* Record banner */
.record-bar {
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  gap: 20px;
  align-items: center;
}
.record-stat { text-align: center; }
.record-stat .val {
  font-size: 17px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.record-stat .lbl {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.win-val { color: var(--green); }
.loss-val { color: var(--red); }
.push-val { color: var(--yellow); }
.divider { width: 1px; height: 28px; background: var(--border); }

/* Date header */
.date-header {
  padding: 18px 20px 10px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
}

/* Pick cards */
.picks-list { padding: 0 16px 24px; display: flex; flex-direction: column; gap: 12px; }

.pick-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.pick-card.win  { border-left: 3px solid var(--green); }
.pick-card.loss { border-left: 3px solid var(--red); }
.pick-card.push { border-left: 3px solid var(--yellow); }
.pick-card.pending { border-left: 3px solid var(--accent); }

.pick-header {
  padding: 14px 16px 10px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}
.pick-main { flex: 1; min-width: 0; }
.pick-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
.pick-game {
  font-size: 12px;
  color: var(--text3);
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.pick-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
  flex-shrink: 0;
}
.odds-badge {
  font-size: 15px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--text);
}
.conviction-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  background: rgba(59,130,246,0.15);
  color: var(--accent);
}
.conviction-badge.high { background: rgba(34,197,94,0.15); color: var(--green); }

.result-badge {
  font-size: 13px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
}
.result-badge.win  { background: rgba(34,197,94,0.15);  color: var(--green); }
.result-badge.loss { background: rgba(239,68,68,0.15);  color: var(--red); }
.result-badge.push { background: rgba(245,158,11,0.15); color: var(--yellow); }
.result-badge.pending { background: rgba(59,130,246,0.12); color: var(--accent); }

/* Bet type chip */
.chips {
  padding: 0 16px 12px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.chip {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 6px;
  background: var(--bg3);
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.chip.spread { color: #a78bfa; background: rgba(167,139,250,0.12); }
.chip.ml     { color: #38bdf8; background: rgba(56,189,248,0.12); }
.chip.total  { color: #fb923c; background: rgba(251,146,60,0.12); }

/* Reasoning */
.reasoning-toggle {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.reasoning-toggle-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.reasoning-arrow { color: var(--text3); font-size: 13px; transition: transform 0.2s; }
.reasoning-arrow.open { transform: rotate(180deg); }

.reasoning-body {
  padding: 0 16px 14px;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.65;
  display: none;
}
.reasoning-body.open { display: block; }

/* States */
.state-container {
  padding: 60px 20px;
  text-align: center;
}
.state-icon { font-size: 40px; margin-bottom: 16px; }
.state-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.state-sub { font-size: 14px; color: var(--text3); }

.loading-ring {
  display: inline-block;
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Install banner */
.install-banner {
  background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(59,130,246,0.05));
  border: 1px solid rgba(59,130,246,0.25);
  border-radius: 12px;
  margin: 0 16px 16px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.install-banner-text { flex: 1; font-size: 13px; color: var(--text2); line-height: 1.4; }
.install-banner-text strong { color: var(--text); display: block; margin-bottom: 2px; }
.install-banner-close {
  color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0;
}

.header-logo {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  object-fit: cover;
  /* Versioned src set in HTML — forces fresh load on iOS */
  flex-shrink: 0;
}
  padding: 50px 24px;
  text-align: center;
}
</style>
</head>

<script>
const WORKER_URL = 'https://sharpaction.pig-panel-development.workers.dev';
const SEEN_KEY   = 'cp_seen';
const RECORD_KEY = 'cp_record';

let installPrompt = null;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); installPrompt = e; });

// ── localStorage helpers ──────────────────────────────────────────────────────

function loadSeen()   { try { return new Set(JSON.parse(localStorage.getItem(SEEN_KEY) || '[]')); } catch(e) { return new Set(); } }
function saveSeen(s)  { try { localStorage.setItem(SEEN_KEY, JSON.stringify([...s])); } catch(e) {} }
function loadRecord() { try { return JSON.parse(localStorage.getItem(RECORD_KEY) || '{"w":0,"l":0,"p":0}'); } catch(e) { return {w:0,l:0,p:0}; } }
function saveRecord(r){ try { localStorage.setItem(RECORD_KEY, JSON.stringify(r)); } catch(e) {} }

// ── Format helpers ────────────────────────────────────────────────────────────

function formatOdds(odds) {
  if (odds === null || odds === undefined || odds === '') return '—';
  const n = parseFloat(odds);
  if (isNaN(n)) return odds;
  return n > 0 ? '+' + n : String(n);
}

function formatTime(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleString('en-US', {
      month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit',
      hour12: true, timeZone: 'America/Denver'
    }) + ' MT';
  } catch(e) { return ''; }
}

function getResultLabel(status) {
  if (!status || status === 'pending') return { label: 'Pending',  cls: 'pending' };
  if (status === 'win')                return { label: '✓ Win',    cls: 'win'     };
  if (status === 'loss')               return { label: '✗ Loss',   cls: 'loss'    };
  if (status === 'push')               return { label: '— Push',   cls: 'push'    };
  if (status === 'ungraded')           return { label: '? Check manually', cls: 'pending' };
  return { label: status, cls: 'pending' };
}

function getBetTypeLabel(t) {
  return { spread: 'Spread', ml: 'Moneyline', total: 'Total' }[t] || t || '';
}

function isGraded(p) {
  return p.status === 'win' || p.status === 'loss' || p.status === 'push';
}

function dateLabel(yyyymmdd) {
  if (!yyyymmdd) return '';
  try {
    const dt = new Date(yyyymmdd.slice(0,4)+'-'+yyyymmdd.slice(4,6)+'-'+yyyymmdd.slice(6,8)+'T12:00:00');
    return dt.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  } catch(e) { return ''; }
}

// ── ESPN fetch (direct — public, no auth) ────────────────────────────────────

const ESPN_LEAGUES = {
  NBA:   'basketball/nba',
  NHL:   'hockey/nhl',
  MLB:   'baseball/mlb',
  NCAAB: 'basketball/mens-college-basketball',
};
const ESPN_PARAMS = {
  NCAAB: '&limit=300&groups=50',
};

async function fetchEspnScores(league, dateYYYYMMDD) {
  const path = ESPN_LEAGUES[league?.toUpperCase()];
  if (!path) return [];
  const params = ESPN_PARAMS[league?.toUpperCase()] || '';
  try {
    const url = `https://site.api.espn.com/apis/site/v2/sports/${path}/scoreboard?dates=${dateYYYYMMDD}${params}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) return [];
    const data = await res.json();
    return (data.events || []).map(ev => {
      const comp  = ev.competitions?.[0];
      if (!comp) return null;
      const state = comp.status?.type?.state; // 'pre' | 'in' | 'post'
      const teams = comp.competitors || [];
      const away  = teams.find(t => t.homeAway === 'away');
      const home  = teams.find(t => t.homeAway === 'home');
      return {
        awayName:  away?.team?.displayName || away?.team?.name || '',
        homeName:  home?.team?.displayName || home?.team?.name || '',
        awayAbbr:  away?.team?.abbreviation || '',
        homeAbbr:  home?.team?.abbreviation || '',
        awayScore: parseFloat(away?.score ?? 'NaN'),
        homeScore: parseFloat(home?.score ?? 'NaN'),
        isFinal:   state === 'post',
        isLive:    state === 'in',
      };
    }).filter(Boolean);
  } catch(e) { return []; }
}

// ── Team name matching (ported from dashboard) ────────────────────────────────

function scoreMatchesPick(score, pick) {
  if (!score || !pick.away_team || !pick.home_team) return false;
  const norm = s => (s || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  const expandCity = s => (s || '')
    .replace(/\bLA\b/g, 'Los Angeles').replace(/\bNY\b/g, 'New York')
    .replace(/\bGS\b/g, 'Golden State').replace(/\bKC\b/g, 'Kansas City')
    .replace(/\bSF\b/g, 'San Francisco').replace(/\bSJ\b/g, 'San Jose')
    .replace(/\bTB\b/g, 'Tampa Bay').replace(/\bOKC\b/g, 'Oklahoma City');
  const lastWord = s => norm(s).match(/([a-z]+)$/)?.[1] || norm(s);

  const an = norm(expandCity(score.awayName)), at = norm(expandCity(pick.away_team));
  const hn = norm(expandCity(score.homeName)), ht = norm(expandCity(pick.home_team));
  const aa = norm(score.awayAbbr), ha = norm(score.homeAbbr);

  const awayMatch = an.includes(at) || at.includes(an) ||
    lastWord(score.awayName) === lastWord(pick.away_team) ||
    (aa.length >= 2 && (aa === norm(pick.away_team) || norm(pick.away_team).startsWith(aa)));
  const homeMatch = hn.includes(ht) || ht.includes(hn) ||
    lastWord(score.homeName) === lastWord(pick.home_team) ||
    (ha.length >= 2 && (ha === norm(pick.home_team) || norm(pick.home_team).startsWith(ha)));
  return awayMatch && homeMatch;
}

// ── Grading logic (ported from dashboard) ────────────────────────────────────

function gradePick(pick, awayScore, homeScore) {
  if (isNaN(awayScore) || isNaN(homeScore)) return null;
  let side = pick.pick_side;
  if (!side || side === 'null') {
    const pt = (pick.pick || '').toLowerCase();
    const al = (pick.away_team || '').toLowerCase();
    const hl = (pick.home_team || '').toLowerCase();
    if      (pt.includes('over'))  side = 'over';
    else if (pt.includes('under')) side = 'under';
    else if (al && pt.includes(al.split(' ').pop())) side = 'away';
    else if (hl && pt.includes(hl.split(' ').pop())) side = 'home';
  }
  if (pick.bet_type === 'ml') {
    if (side === 'away') return awayScore > homeScore ? 'win' : awayScore < homeScore ? 'loss' : 'push';
    if (side === 'home') return homeScore > awayScore ? 'win' : homeScore < awayScore ? 'loss' : 'push';
  } else if (pick.bet_type === 'spread') {
    let line = side === 'away' ? (pick.stored_away_spread ?? null) : (pick.stored_home_spread ?? null);
    if (line == null) { const m = pick.pick?.match(/([+-]?\d+\.?\d*)\s*$/); if (m) line = parseFloat(m[1]); }
    if (line == null) return null;
    const adj = (side === 'away' ? awayScore : homeScore) + parseFloat(line);
    const opp =  side === 'away' ? homeScore : awayScore;
    return adj > opp ? 'win' : adj < opp ? 'loss' : 'push';
  } else if (pick.bet_type === 'total') {
    const line = pick.stored_total_line ?? (() => { const m = pick.pick?.match(/(\d+\.?\d*)/); return m ? parseFloat(m[1]) : null; })();
    if (line == null) return null;
    const total = awayScore + homeScore;
    if (side === 'over')  return total > line ? 'win' : total < line ? 'loss' : 'push';
    else                  return total < line ? 'win' : total > line ? 'loss' : 'push';
  }
  return null;
}

// ── Main load + grade flow ────────────────────────────────────────────────────

async function loadPicks() {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="state-container"><div class="loading-ring"></div><div class="state-title">Loading picks...</div></div>`;
  try {
    const res = await fetch(WORKER_URL + '/picks', { cache: 'no-store' });
    if (!res.ok) throw new Error('Server error ' + res.status);
    const data = await res.json();

    let picks = data.picks || [];
    if (picks.length === 0) { renderPicks(picks, data.updatedAt); return; }

    // Update loading message
    app.querySelector('.state-title') && (app.querySelector('.state-title').textContent = 'Checking scores...');

    // Fetch ESPN scores for each unique league+date combo
    const combos = [...new Set(picks.map(p => `${(p.league||'').toUpperCase()}|${p.date||''}`))]
      .map(k => { const [lg, dt] = k.split('|'); return { lg, dt }; })
      .filter(c => c.lg && c.dt && ESPN_LEAGUES[c.lg]);

    const scoreMap = {};
    await Promise.all(combos.map(async ({ lg, dt }) => {
      scoreMap[`${lg}|${dt}`] = await fetchEspnScores(lg, dt);
    }));

    // Grade each pick against ESPN
    picks = picks.map(pick => {
      // Already graded from KV — trust it
      if (isGraded(pick)) return pick;

      const lg  = (pick.league || '').toUpperCase();
      const dt  = pick.date || '';
      const key = `${lg}|${dt}`;
      const scores = scoreMap[key];

      if (!scores) return pick; // league not in ESPN map — leave pending

      const matched = scores.find(s => scoreMatchesPick(s, pick));

      if (!matched) {
        // No match found — could be name mismatch or game not yet on board
        // Only mark ungraded if we got a non-empty scoresheet (game day data exists)
        if (scores.length > 0) return { ...pick, status: 'ungraded' };
        return pick; // empty scoresheet = game hasn't started or not fetched yet
      }

      if (matched.isLive) return pick; // in progress — stay pending

      if (matched.isFinal) {
        const result = gradePick(pick, matched.awayScore, matched.homeScore);
        if (result) return { ...pick, status: result, final_score: `${matched.awayScore}-${matched.homeScore}` };
        return { ...pick, status: 'ungraded' }; // couldn't compute grade
      }

      return pick; // not started yet
    });

    renderPicks(picks, data.updatedAt);
  } catch(e) {
    app.innerHTML = `
      <div class="state-container">
        <div class="state-icon">⚠️</div>
        <div class="state-title">Couldn't load picks</div>
        <div class="state-sub">${e.message}</div>
      </div>`;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderPicks(picks, updatedAt) {
  const app   = document.getElementById('app');
  const updEl = document.getElementById('updated-time');
  updEl.textContent = updatedAt ? 'Updated ' + formatTime(updatedAt) : '';

  const seen   = loadSeen();
  const record = loadRecord();

  // Categorise
  const newlyGraded = picks.filter(p => isGraded(p) && !seen.has(p.id));
  const ungraded    = picks.filter(p => p.status === 'ungraded');
  const pending     = picks.filter(p => !isGraded(p) && p.status !== 'ungraded');

  // Tally new results into all-time record + mark seen
  newlyGraded.forEach(p => {
    if (p.status === 'win')  record.w++;
    if (p.status === 'loss') record.l++;
    if (p.status === 'push') record.p++;
    seen.add(p.id);
  });
  saveRecord(record);
  saveSeen(seen);

  // All picks that were graded on a prior session are now hidden
  const visiblePicks = [...newlyGraded, ...ungraded, ...pending];

  let html = '';

  // iOS install hint
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone;
  if (isIOS && !sessionStorage.getItem('hideInstall')) {
    html += `
      <div class="install-banner" id="install-banner">
        <div class="install-banner-text">
          <strong>Add to Home Screen</strong>
          Tap the share icon → "Add to Home Screen" for quick access.
        </div>
        <div class="install-banner-close" onclick="dismissInstall()">✕</div>
      </div>`;
  }

  // All-time record bar
  const denom = record.w + record.l;
  html += `
    <div class="record-bar">
      <div class="record-stat"><div class="val win-val">${record.w}</div><div class="lbl">Wins</div></div>
      <div class="divider"></div>
      <div class="record-stat"><div class="val loss-val">${record.l}</div><div class="lbl">Losses</div></div>`;
  if (record.p > 0) html += `
      <div class="divider"></div>
      <div class="record-stat"><div class="val push-val">${record.p}</div><div class="lbl">Pushes</div></div>`;
  if (denom > 0) html += `
      <div class="divider"></div>
      <div class="record-stat">
        <div class="val" style="color:var(--text2)">${Math.round((record.w/denom)*100)}%</div>
        <div class="lbl">Win %</div>
      </div>`;
  html += `<div style="flex:1"></div><div style="font-size:10px;color:var(--text3);align-self:center">ALL TIME</div></div>`;

  // Empty state
  if (visiblePicks.length === 0) {
    const hasPicks = picks.length > 0;
    html += `
      <div class="no-picks">
        <div class="state-icon">${hasPicks ? '✅' : '📋'}</div>
        <div class="state-title">${hasPicks ? 'All caught up' : 'No picks yet today'}</div>
        <div class="state-sub">${hasPicks ? 'Results seen. Check back for new picks.' : 'Check back after picks are generated.'}</div>
      </div>`;
    app.innerHTML = html;
    return;
  }

  // Results section (newly graded — seen once then gone)
  if (newlyGraded.length > 0) {
    const dl = dateLabel(newlyGraded[0]?.date);
    html += `<div class="date-header">Results${dl ? ' — ' + dl : ''}</div><div class="picks-list">`;
    newlyGraded.forEach((p, i) => { html += buildPickCard(p, i, true); });
    html += `</div>`;
  }

  // Unable to grade
  if (ungraded.length > 0) {
    html += `<div class="date-header">Check Manually</div><div class="picks-list">`;
    ungraded.forEach((p, i) => { html += buildPickCard(p, newlyGraded.length + i, false); });
    html += `</div>`;
  }

  // Pending bets
  if (pending.length > 0) {
    html += `<div class="date-header">Pending · ${pending.length} Bet${pending.length !== 1 ? 's' : ''}</div><div class="picks-list">`;
    pending.forEach((p, i) => { html += buildPickCard(p, newlyGraded.length + ungraded.length + i, false); });
    html += `</div>`;
  }

  app.innerHTML = html;
}

// ── Pick card ─────────────────────────────────────────────────────────────────

function buildPickCard(p, i, showScore) {
  const result   = getResultLabel(p.status);
  const conv     = parseInt(p.conviction) || 0;
  const convHigh = conv >= 8;
  const betLabel = getBetTypeLabel(p.bet_type);
  const gameStr  = p.game || (p.away_team && p.home_team ? `${p.away_team} @ ${p.home_team}` : '');
  const scoreStr = showScore && p.final_score ? ` · Final: ${p.final_score}` : '';

  return `
    <div class="pick-card ${result.cls}">
      <div class="pick-header">
        <div class="pick-main">
          <div class="pick-name">${p.pick || '—'}</div>
          ${gameStr ? `<div class="pick-game">${gameStr}${scoreStr}</div>` : ''}
        </div>
        <div class="pick-meta">
          <div class="odds-badge">${formatOdds(p.odds)}</div>
          ${conv ? `<div class="conviction-badge ${convHigh ? 'high' : ''}">Conv ${conv}</div>` : ''}
          <div class="result-badge ${result.cls}">${result.label}</div>
        </div>
      </div>
      <div class="chips">
        ${betLabel ? `<span class="chip ${p.bet_type || ''}">${betLabel}</span>` : ''}
        ${p.league ? `<span class="chip">${p.league}</span>` : ''}
      </div>
      ${p.reasoning ? `
      <div class="reasoning-toggle" onclick="toggleReasoning(${i})">
        <span class="reasoning-toggle-label">Analysis</span>
        <span class="reasoning-arrow" id="arrow-${i}">▼</span>
      </div>
      <div class="reasoning-body" id="reasoning-${i}">${p.reasoning}</div>` : ''}
    </div>`;
}

function toggleReasoning(i) {
  const body  = document.getElementById('reasoning-' + i);
  const arrow = document.getElementById('arrow-' + i);
  if (body)  body.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open');
}

function dismissInstall() {
  sessionStorage.setItem('hideInstall', '1');
  const b = document.getElementById('install-banner');
  if (b) b.remove();
}

// Load on open
loadPicks();
</script>
