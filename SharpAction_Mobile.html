<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>SharpAction Picks</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #0a0e14; --bg2: #111820; --bg3: #1a2230;
  --border: #1e2a3a; --text: #e8edf3; --text2: #a0b0c4; --text3: #5a6f88;
  --accent: #00e5ff; --accent2: #ff6d00;
  --green: #00e676; --red: #ff1744; --yellow: #ffd600;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg1); color:var(--text); font-family:'JetBrains Mono',monospace; min-height:100vh; padding-bottom:env(safe-area-inset-bottom); }

.hdr { position:sticky; top:0; z-index:10; background:var(--bg1); border-bottom:1px solid var(--border); padding:14px 16px; }
.hdr-top { display:flex; justify-content:space-between; align-items:center; }
.logo { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:var(--accent); }
.logo span { color:var(--accent2); }
.date { font-size:9px; color:var(--text3); letter-spacing:1px; margin-top:2px; }

.rec { display:flex; gap:16px; align-items:baseline; padding:10px 16px; background:var(--bg2); border-bottom:1px solid var(--border); }
.rec-main { font-family:'Bebas Neue',sans-serif; font-size:32px; }
.rec-stat { text-align:center; }
.rec-val { font-size:12px; font-weight:700; }
.rec-lbl { font-size:7px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; }
.pos { color:var(--green); } .neg { color:var(--red); }

.actions { display:flex; gap:8px; padding:12px 16px; }
.act-btn {
  flex:1; padding:10px; border-radius:8px; border:none; cursor:pointer;
  font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.act-btn:active { transform:scale(0.97); }
.act-grade { background:rgba(0,230,118,0.12); color:var(--green); border:1px solid rgba(0,230,118,0.3); }
.act-refresh { background:rgba(0,229,255,0.1); color:var(--accent); border:1px solid rgba(0,229,255,0.25); }

.ds { display:flex; flex-wrap:wrap; gap:3px 10px; padding:6px 16px 10px; font-size:8px; }
.ds-lbl { color:var(--text3); font-weight:700; text-transform:uppercase; letter-spacing:1px; width:100%; margin-bottom:1px; }

.card {
  margin:0 12px 10px; background:var(--bg2); border:1px solid var(--border);
  border-radius:10px; padding:14px; position:relative; overflow:hidden;
}
.card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
.card.pending::before { background:var(--accent); }
.card.win::before { background:var(--green); }
.card.loss::before { background:var(--red); }
.card.push::before { background:var(--text3); }

.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.pick-name { font-size:14px; font-weight:700; color:var(--accent2); line-height:1.2; }
.pick-sub { font-size:10px; color:var(--text3); margin-top:2px; }
.conv { text-align:center; min-width:36px; }
.conv-n { font-family:'Bebas Neue',sans-serif; font-size:26px; line-height:1; }
.conv-l { font-size:7px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; }

.game-line { font-size:10px; color:var(--text2); margin-bottom:6px; display:flex; align-items:center; gap:5px; }
.dot { display:inline-block; width:5px; height:5px; border-radius:50%; }

.reasoning { font-size:10px; color:var(--text3); line-height:1.5; font-style:italic; }

.card-foot { display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:8px; border-top:1px solid var(--border); }
.badge { font-size:9px; font-weight:700; padding:3px 8px; border-radius:4px; display:inline-flex; align-items:center; gap:3px; }
.b-pending { background:rgba(0,229,255,0.1); color:var(--accent); border:1px solid rgba(0,229,255,0.2); }
.b-win { background:rgba(0,230,118,0.1); color:var(--green); border:1px solid rgba(0,230,118,0.2); }
.b-loss { background:rgba(255,23,68,0.1); color:var(--red); border:1px solid rgba(255,23,68,0.2); }
.b-push { background:rgba(255,255,255,0.05); color:var(--text3); border:1px solid var(--border); }

.clv { font-size:8px; font-weight:700; padding:2px 5px; border-radius:3px; background:rgba(255,255,255,0.03); border:1px solid var(--border); }

.grade-btns { display:flex; gap:6px; margin-top:8px; }
.g-btn {
  flex:1; padding:8px; border-radius:6px; border:none; cursor:pointer;
  font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
}
.g-btn:active { transform:scale(0.95); }
.g-w { background:rgba(0,230,118,0.15); color:var(--green); border:1px solid rgba(0,230,118,0.3); }
.g-l { background:rgba(255,23,68,0.15); color:var(--red); border:1px solid rgba(255,23,68,0.3); }
.g-p { background:rgba(255,255,255,0.05); color:var(--text3); border:1px solid var(--border); }

.empty { text-align:center; padding:60px 20px; color:var(--text3); }
.empty-ico { font-size:36px; margin-bottom:10px; }
.empty-msg { font-size:12px; line-height:1.6; }

.toast {
  position:fixed; bottom:20px; left:16px; right:16px; padding:12px 16px;
  background:var(--bg3); border:1px solid var(--border); border-radius:8px;
  font-size:11px; text-align:center; z-index:50; display:none;
}

.score-line { font-size:9px; color:var(--text2); margin-top:4px; font-style:normal; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="logo">SHARP<span>ACTION</span></div>
      <div class="date" id="date-lbl"></div>
    </div>
    <div id="rec" class="rec" style="padding:0;border:none;background:none"></div>
  </div>
</div>

<div class="actions">
  <button class="act-btn act-grade" id="grade-btn" onclick="doGrade()">↻ Grade</button>
  <button class="act-btn act-refresh" onclick="render()">↻ Refresh</button>
</div>
<div class="ds" id="ds"></div>
<div id="picks"></div>
<div class="toast" id="toast"></div>

<script>
const PICKS_STAKE = 10;

function dateStr(offset=0) {
  const d = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Denver'}));
  d.setDate(d.getDate()+offset);
  return d.getFullYear().toString()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
}
function fmt(o) { if(o==null)return null; const n=parseFloat(o); if(isNaN(n))return null; return n>0?'+'+n:''+n; }
function todayPickKey() { return 'picks:'+dateStr(0); }
function oddsToProfit(odds,stake) { const o=parseFloat(odds); if(isNaN(o))return parseFloat(((100/110)*stake).toFixed(2)); return o<0?parseFloat(((100/Math.abs(o))*stake).toFixed(2)):parseFloat(((o/100)*stake).toFixed(2)); }
function pickPnl(p) { if(p.status==='win')return oddsToProfit(p.odds??-110,PICKS_STAKE); if(p.status==='loss')return -PICKS_STAKE; return 0; }

function toast(msg,dur=2000) { const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',dur); }

const SC = { NBA:'#ff6b35', NHL:'#00d4ff', MLB:'#ff4444', NCAAB:'#ffd600', NFL:'#00e676' };

function loadData() {
  let data = null;
  try { const r=localStorage.getItem(todayPickKey()); if(r)data=JSON.parse(r); } catch(e){}
  if (!data?.picks?.length) {
    const keys=[]; for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.startsWith('picks:'))keys.push(k);}
    keys.sort().reverse();
    for(const k of keys){try{const d=JSON.parse(localStorage.getItem(k));if(d?.picks?.length){data=d;break;}}catch(e){}}
  }
  return data;
}

function render() {
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Denver'}));
  document.getElementById('date-lbl').textContent = now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

  const data = loadData();
  if (!data?.picks?.length) {
    document.getElementById('rec').innerHTML='';
    document.getElementById('ds').innerHTML='';
    document.getElementById('picks').innerHTML='<div class="empty"><div class="empty-ico">🤖</div><div class="empty-msg">No picks yet.<br>Generate from the desktop dashboard.</div></div>';
    return;
  }

  const picks=data.picks;
  const graded=picks.filter(p=>['win','loss','push'].includes(p.status));
  const w=graded.filter(p=>p.status==='win').length;
  const l=graded.filter(p=>p.status==='loss').length;
  const pu=graded.filter(p=>p.status==='push').length;
  const pnl=graded.reduce((s,p)=>s+pickPnl(p),0);
  const pending=picks.filter(p=>p.status==='pending').length;

  document.getElementById('rec').innerHTML=`
    <div class="rec-main">${w}-${l}${pu?'-'+pu:''}</div>
    <div class="rec-stat"><div class="rec-val ${pnl>=0?'pos':'neg'}">${pnl>=0?'+':''}$${Math.abs(pnl).toFixed(2)}</div><div class="rec-lbl">P&L</div></div>
    <div class="rec-stat"><div class="rec-val" style="color:var(--text)">${picks.length}</div><div class="rec-lbl">Picks</div></div>
    ${pending?`<div class="rec-stat"><div class="rec-val" style="color:var(--accent)">${pending}</div><div class="rec-lbl">Pending</div></div>`:''}`;

  const ds=data.dataStatus||[];
  document.getElementById('ds').innerHTML=ds.length?'<div class="ds-lbl">Data Sources</div>'+ds.map(s=>{
    if(!s.ok)return`<span style="color:var(--red)">✗ ${s.name}</span>`;
    if(s.count===0)return`<span style="color:var(--yellow)">○ ${s.name}</span>`;
    return`<span style="color:var(--green)">✔ ${s.name} (${s.count})</span>`;
  }).join(''):'';

  document.getElementById('picks').innerHTML = picks.map((p,i) => {
    const st=p.status||'pending';
    const cc=!p.conviction?'var(--text3)':p.conviction>=9?'var(--green)':p.conviction>=7?'var(--accent)':'var(--text3)';
    const pv=pickPnl(p);
    const pnlH=(st==='win'||st==='loss')?`<span class="rec-val ${st==='win'?'pos':'neg'}" style="font-size:11px">${pv>=0?'+':''}$${Math.abs(pv).toFixed(2)}</span>`:'';
    const clvH=p.clv!=null?`<span class="clv" style="color:${p.clv>0?'var(--green)':p.clv<0?'var(--red)':'var(--text3)'}">CLV ${p.clv>0?'+':''}${p.clv}${p.bet_type==='ml'?'%':'pts'}</span>`:'';
    const badges={pending:'<span class="badge b-pending">⏳ PENDING</span>',win:'<span class="badge b-win">✓ WIN</span>',loss:'<span class="badge b-loss">✗ LOSS</span>',push:'<span class="badge b-push">— PUSH</span>'};
    const scoreH=p.final_score?`<div class="score-line">${p.final_score}${p.went_to_ot?' (OT)':''}${p.cover_margin!=null?` · ${st==='win'?'covered':'missed'} by ${Math.abs(p.cover_margin)}`:''}</div>`:'';
    const manualBtns=st==='pending'?`<div class="grade-btns">
      <button class="g-btn g-w" onclick="manualGrade('${p.id}','win')">W</button>
      <button class="g-btn g-l" onclick="manualGrade('${p.id}','loss')">L</button>
      <button class="g-btn g-p" onclick="manualGrade('${p.id}','push')">P</button>
    </div>`:'';

    return`<div class="card ${st}">
      <div class="card-top">
        <div><div class="pick-name">${p.pick}</div><div class="pick-sub">${fmt(p.odds)||'—'} · ${(p.bet_type||'').toUpperCase()}</div></div>
        <div class="conv"><div class="conv-n" style="color:${cc}">${p.conviction||'—'}</div><div class="conv-l">/10</div></div>
      </div>
      <div class="game-line"><span class="dot" style="background:${SC[p.league]||'#888'}"></span>${p.game||''} · ${p.league||''}</div>
      <div class="reasoning">${p.reasoning||''}</div>
      ${scoreH}
      <div class="card-foot">
        <div style="display:flex;gap:6px;align-items:center">${badges[st]||''}${pnlH}</div>
        ${clvH}
      </div>
      ${manualBtns}
    </div>`;
  }).join('');
}

function manualGrade(pickId, status) {
  // Find which day this pick belongs to
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k?.startsWith('picks:'))continue;
    try{
      const data=JSON.parse(localStorage.getItem(k));
      const pk=data?.picks?.find(p=>p.id===pickId);
      if(pk){pk.status=status;localStorage.setItem(k,JSON.stringify(data));toast(`${pk.pick} → ${status.toUpperCase()}`);render();return;}
    }catch(e){}
  }
}

async function fetchScores(dateYMD,league) {
  const map={NBA:{path:'basketball/nba',p:''},NHL:{path:'hockey/nhl',p:''},MLB:{path:'baseball/mlb',p:''},NFL:{path:'football/nfl',p:''},NCAAB:{path:'basketball/mens-college-basketball',p:'&limit=300&groups=50'},NCAAMB:{path:'basketball/mens-college-basketball',p:'&limit=300&groups=50'}};
  const cfg=map[league?.toUpperCase()]; if(!cfg)return[];
  try{
    const res=await fetch(`https://site.api.espn.com/apis/site/v2/sports/${cfg.path}/scoreboard?dates=${dateYMD}${cfg.p}`,{signal:AbortSignal.timeout(10000)});
    if(!res.ok)return[];
    const d=await res.json();
    return(d.events||[]).map(ev=>{
      const c=ev.competitions?.[0];if(!c||c.status?.type?.state!=='post')return null;
      const t=c.competitors||[],a=t.find(x=>x.homeAway==='away'),h=t.find(x=>x.homeAway==='home');
      const period=c.status?.period||0,detail=c.status?.type?.detail||'';
      const isOT=/overtime|OT/i.test(detail)||(()=>{const lg=league?.toUpperCase();if(lg==='NBA'||lg==='NCAAB')return period>4;if(lg==='NHL')return period>3;if(lg==='MLB')return period>9;return false;})();
      return{awayName:a?.team?.displayName||'',homeName:h?.team?.displayName||'',awayAbbr:a?.team?.abbreviation||'',homeAbbr:h?.team?.abbreviation||'',awayScore:parseFloat(a?.score??'NaN'),homeScore:parseFloat(h?.score??'NaN'),isOT,otPeriods:isOT?(league==='MLB'?period-9:league==='NHL'?period-3:period-4):0};
    }).filter(Boolean);
  }catch(e){return[];}
}

function matchScore(sc,pk) {
  if(!sc||!pk.away_team||!pk.home_team)return false;
  const norm=s=>(s||'').toLowerCase().replace(/\bsaint\b/g,'st').replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim();
  const ns=s=>norm(s).replace(/\s/g,'');
  const lw=s=>{const w=norm(s).split(' ');return w[w.length-1];};
  const fw=s=>{const w=norm(s).split(' ');return w[0];};
  const m=(er,ea,pr)=>{const e=ns(er),p=ns(pr),a=ns(ea);return e.includes(p)||p.includes(e)||(a.length>=2&&(a===p||p.startsWith(a)))||lw(er)===lw(pr)||(fw(er)===fw(pr)&&fw(pr).length>3);};
  return m(sc.awayName,sc.awayAbbr,pk.away_team)&&m(sc.homeName,sc.homeAbbr,pk.home_team);
}

function gradeOne(pk,aS,hS) {
  if(isNaN(aS)||isNaN(hS))return null;
  if(pk.bet_type==='ml')return pk.pick_side==='away'?(aS>hS?'win':aS<hS?'loss':'push'):(hS>aS?'win':hS<aS?'loss':'push');
  if(pk.bet_type==='spread'){
    let ln=pk.pick_side==='away'?pk.stored_away_spread:pk.stored_home_spread;
    if(ln==null){const m=pk.pick?.match(/([+-]?\d+\.?\d*)\s*$/);if(m)ln=parseFloat(m[1]);}
    if(ln==null)return null;
    const adj=(pk.pick_side==='away'?aS:hS)+parseFloat(ln),opp=pk.pick_side==='away'?hS:aS;
    return adj>opp?'win':adj<opp?'loss':'push';
  }
  if(pk.bet_type==='total'){
    let ln=pk.stored_total_line;if(ln==null){const m=pk.pick?.match(/(\d+\.?\d*)/);if(m)ln=parseFloat(m[1]);}
    if(ln==null)return null;const tot=aS+hS;
    return pk.pick_side==='over'?(tot>ln?'win':tot<ln?'loss':'push'):(tot<ln?'win':tot>ln?'loss':'push');
  }
  return null;
}

function calcCLV(pk) {
  if(pk.bet_type==='spread'){
    const pL=pk.pick_side==='away'?pk.stored_away_spread:pk.stored_home_spread;
    const cL=pk.pick_side==='away'?pk.closing_away_spread:pk.closing_home_spread;
    if(pL==null||cL==null)return null;
    return+(pL-cL).toFixed(1);
  }
  if(pk.bet_type==='ml'){
    const pO=pk.pick_side==='away'?pk.stored_away_ml:pk.stored_home_ml;
    const cO=pk.pick_side==='away'?pk.closing_away_ml:pk.closing_home_ml;
    if(pO==null||cO==null)return null;
    const pI=pO>0?100/(pO+100):Math.abs(pO)/(Math.abs(pO)+100);
    const cI=cO>0?100/(cO+100):Math.abs(cO)/(Math.abs(cO)+100);
    return+((cI-pI)*100).toFixed(1);
  }
  if(pk.bet_type==='total'){
    const pL=pk.stored_total_line,cL=pk.closing_total_line;
    if(pL==null||cL==null)return null;
    if(pk.pick_side==='over')return+(cL-pL).toFixed(1);
    if(pk.pick_side==='under')return+(pL-cL).toFixed(1);
  }
  return null;
}

async function doGrade() {
  const btn=document.getElementById('grade-btn');
  btn.textContent='⏳ Grading...'; btn.disabled=true;
  try{
    const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.startsWith('picks:'))keys.push(k);}
    let total=0;
    for(const key of keys){
      let data;try{data=JSON.parse(localStorage.getItem(key));}catch(e){continue;}
      if(!data?.picks?.some(p=>p.status==='pending'&&['spread','ml','total'].includes(p.bet_type)))continue;
      const leagues=[...new Set(data.picks.filter(p=>p.status==='pending'&&['spread','ml','total'].includes(p.bet_type)).map(p=>p.league?.toUpperCase()).filter(Boolean))];
      const scores={};
      await Promise.all(leagues.map(async lg=>{scores[lg]=await fetchScores(data.date,lg);}));
      let updated=false;
      for(const pk of data.picks){
        if(pk.status!=='pending'||!['spread','ml','total'].includes(pk.bet_type))continue;
        const sc=(scores[pk.league?.toUpperCase()]||[]).find(s=>matchScore(s,pk));
        if(!sc)continue;
        const result=gradeOne(pk,sc.awayScore,sc.homeScore);
        if(result){
          pk.status=result;
          pk.final_score=`${sc.awayName} ${sc.awayScore}, ${sc.homeName} ${sc.homeScore}`;
          pk.game_margin=Math.abs(sc.awayScore-sc.homeScore);
          pk.went_to_ot=sc.isOT||false;
          pk.ot_periods=sc.otPeriods||0;
          if(pk.bet_type==='spread'){
            const ln=pk.pick_side==='away'?pk.stored_away_spread:pk.stored_home_spread;
            if(ln!=null){const adj=(pk.pick_side==='away'?sc.awayScore:sc.homeScore)+parseFloat(ln);pk.cover_margin=+(adj-(pk.pick_side==='away'?sc.homeScore:sc.awayScore)).toFixed(1);}
          }else if(pk.bet_type==='total'&&pk.stored_total_line!=null){
            const gt=sc.awayScore+sc.homeScore;
            pk.cover_margin=pk.pick_side==='over'?+(gt-pk.stored_total_line).toFixed(1):+(pk.stored_total_line-gt).toFixed(1);
          }
          pk.clv=calcCLV(pk);
          updated=true;total++;
        }
      }
      if(updated)localStorage.setItem(key,JSON.stringify(data));
    }
    toast(total?`✓ Graded ${total} pick${total>1?'s':''}`:'No finished games yet',2500);
  }catch(e){toast('Error: '+e.message,3000);}
  btn.textContent='↻ Grade';btn.disabled=false;
  render();
}

render();
</script>
</body>
</html>
