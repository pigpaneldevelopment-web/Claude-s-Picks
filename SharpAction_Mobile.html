<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SharpAction · Today's Picks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #0a0e14;
  --bg2: #111820;
  --bg3: #1a2230;
  --border: #1e2a3a;
  --text: #e8edf3;
  --text2: #a0b0c4;
  --text3: #5a6f88;
  --accent: #00e5ff;
  --accent2: #ff6d00;
  --green: #00e676;
  --red: #ff1744;
  --yellow: #ffd600;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg1);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  padding: 0 0 env(safe-area-inset-bottom);
  overflow-x: hidden;
}

.header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: linear-gradient(180deg, var(--bg1) 0%, var(--bg1) 85%, transparent 100%);
  padding: 16px 16px 20px;
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--accent);
}
.logo span { color: var(--accent2); }
.date {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.record-bar {
  display: flex;
  gap: 12px;
  align-items: baseline;
}
.record-main {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 1px;
}
.record-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.record-stat-val {
  font-size: 13px;
  font-weight: 700;
}
.record-stat-label {
  font-size: 8px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.pos { color: var(--green); }
.neg { color: var(--red); }

.picks-container {
  padding: 0 12px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.pick-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  position: relative;
  overflow: hidden;
}
.pick-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
}
.pick-card.pending::before { background: var(--accent); }
.pick-card.win::before { background: var(--green); }
.pick-card.loss::before { background: var(--red); }
.pick-card.push::before { background: var(--text3); }

.pick-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}
.pick-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent2);
  line-height: 1.2;
}
.pick-meta {
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
}
.pick-conviction {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 40px;
}
.conv-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  line-height: 1;
}
.conv-label {
  font-size: 8px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.pick-game {
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sport-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.pick-reasoning {
  font-size: 11px;
  color: var(--text3);
  line-height: 1.5;
  font-style: italic;
}

.pick-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 4px;
}
.status-pending { background: rgba(0,229,255,0.12); color: var(--accent); border: 1px solid rgba(0,229,255,0.25); }
.status-win { background: rgba(0,230,118,0.12); color: var(--green); border: 1px solid rgba(0,230,118,0.25); }
.status-loss { background: rgba(255,23,68,0.12); color: var(--red); border: 1px solid rgba(255,23,68,0.25); }
.status-push { background: rgba(255,255,255,0.06); color: var(--text3); border: 1px solid var(--border); }

.pick-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.pick-pnl {
  font-size: 12px;
  font-weight: 700;
}
.clv-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
}

.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-icon {
  font-size: 40px;
  margin-bottom: 12px;
}
.empty-msg {
  font-size: 13px;
  line-height: 1.6;
}

.refresh-btn {
  position: fixed;
  bottom: 20px;
  right: 16px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--bg1);
  border: none;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,229,255,0.3);
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
}
.refresh-btn:active { transform: scale(0.9); }

.data-sources {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 10px;
  padding: 8px 12px;
  margin: 0 12px 8px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 9px;
}
.ds-label {
  color: var(--text3);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  width: 100%;
  margin-bottom: 2px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo">SHARP<span>ACTION</span></div>
      <div class="date" id="date-label"></div>
    </div>
    <div id="record-display" class="record-bar"></div>
  </div>
</div>

<div id="data-sources"></div>
<div id="picks-container" class="picks-container"></div>
<button class="refresh-btn" onclick="loadPicks()" title="Refresh">↻</button>

<script>
const PICKS_STAKE = 10;

function dateStr(offset = 0) {
  const d = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Denver' }));
  d.setDate(d.getDate() + offset);
  return d.getFullYear().toString() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
}

function fmt(o) {
  if (o === null || o === undefined) return null;
  const n = parseFloat(o);
  if (isNaN(n)) return null;
  return n > 0 ? '+'+n : ''+n;
}

function oddsToProfit(odds, stake) {
  const o = parseFloat(odds);
  if (isNaN(o)) return parseFloat(((100/110)*stake).toFixed(2));
  return o < 0 ? parseFloat(((100/Math.abs(o))*stake).toFixed(2)) : parseFloat(((o/100)*stake).toFixed(2));
}

function pickPnl(pick) {
  if (pick.status === 'win')  return oddsToProfit(pick.odds ?? -110, PICKS_STAKE);
  if (pick.status === 'loss') return -PICKS_STAKE;
  return 0;
}

const SPORT_COLORS = {
  NBA: '#ff6b35', NHL: '#00d4ff', MLB: '#ff4444', NCAAB: '#ffd600',
  NFL: '#00e676', NCAAMB: '#ffd600', DEFAULT: '#888'
};

function sportColor(league) {
  return SPORT_COLORS[league?.toUpperCase()] || SPORT_COLORS.DEFAULT;
}

function loadPicks() {
  const today = dateStr(0);
  const key = 'picks:' + today;
  let data = null;

  try {
    const raw = localStorage.getItem(key);
    if (raw) data = JSON.parse(raw);
  } catch(e) {}

  // If no today picks, find most recent
  if (!data?.picks?.length) {
    const allKeys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k?.startsWith('picks:')) allKeys.push(k);
    }
    allKeys.sort().reverse();
    for (const k of allKeys) {
      try {
        const d = JSON.parse(localStorage.getItem(k));
        if (d?.picks?.length) { data = d; break; }
      } catch(e) {}
    }
  }

  // Date label
  const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Denver' }));
  document.getElementById('date-label').textContent = now.toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric'
  });

  if (!data?.picks?.length) {
    document.getElementById('record-display').innerHTML = '';
    document.getElementById('data-sources').innerHTML = '';
    document.getElementById('picks-container').innerHTML = `
      <div class="empty">
        <div class="empty-icon">🤖</div>
        <div class="empty-msg">No picks yet today.<br>Generate from the main dashboard.</div>
      </div>`;
    return;
  }

  // Record & P&L
  const picks = data.picks;
  const graded = picks.filter(p => ['win','loss','push'].includes(p.status));
  const wins = graded.filter(p => p.status === 'win').length;
  const losses = graded.filter(p => p.status === 'loss').length;
  const pushes = graded.filter(p => p.status === 'push').length;
  const pnl = graded.reduce((s,p) => s + pickPnl(p), 0);
  const pnlSign = pnl >= 0 ? '+' : '';
  const pnlCls = pnl >= 0 ? 'pos' : 'neg';

  document.getElementById('record-display').innerHTML = `
    <div class="record-main">${wins}-${losses}${pushes ? '-'+pushes : ''}</div>
    <div class="record-stat">
      <div class="record-stat-val ${pnlCls}">${pnlSign}$${Math.abs(pnl).toFixed(2)}</div>
      <div class="record-stat-label">P&L</div>
    </div>
    <div class="record-stat">
      <div class="record-stat-val" style="color:var(--text)">${picks.length}</div>
      <div class="record-stat-label">Picks</div>
    </div>
  `;

  // Data sources
  const ds = data.dataStatus || [];
  if (ds.length) {
    const items = ds.map(s => {
      if (!s.ok) return `<span style="color:var(--red)">✗ ${s.name}</span>`;
      if (s.count === 0) return `<span style="color:var(--yellow)">○ ${s.name}</span>`;
      return `<span style="color:var(--green)">✔ ${s.name} (${s.count})</span>`;
    }).join('');
    document.getElementById('data-sources').innerHTML = `
      <div class="data-sources">
        <div class="ds-label">Data Sources</div>
        ${items}
      </div>`;
  } else {
    document.getElementById('data-sources').innerHTML = '';
  }

  // Render picks
  const container = document.getElementById('picks-container');
  container.innerHTML = picks.map(pick => {
    const status = pick.status || 'pending';
    const convColor = !pick.conviction ? 'var(--text3)'
      : pick.conviction >= 9 ? 'var(--green)'
      : pick.conviction >= 7 ? 'var(--accent)' : 'var(--text3)';

    const pnlVal = pickPnl(pick);
    const pnlHTML = status === 'win' || status === 'loss'
      ? `<span class="pick-pnl ${status === 'win' ? 'pos' : 'neg'}">${pnlVal >= 0 ? '+' : ''}$${Math.abs(pnlVal).toFixed(2)}</span>`
      : '';

    const clvHTML = pick.clv != null
      ? `<span class="clv-badge" style="color:${pick.clv > 0 ? 'var(--green)' : pick.clv < 0 ? 'var(--red)' : 'var(--text3)'}">CLV ${pick.clv > 0 ? '+' : ''}${pick.clv}${pick.bet_type === 'ml' ? '%' : 'pts'}</span>`
      : '';

    const statusHTML = {
      pending: '<span class="pick-status status-pending">⏳ PENDING</span>',
      win: '<span class="pick-status status-win">✓ WIN</span>',
      loss: '<span class="pick-status status-loss">✗ LOSS</span>',
      push: '<span class="pick-status status-push">— PUSH</span>',
    }[status] || '';

    return `
    <div class="pick-card ${status}">
      <div class="pick-header">
        <div>
          <div class="pick-name">${pick.pick}</div>
          <div class="pick-meta">${fmt(pick.odds) || '—'} · ${(pick.bet_type || '').toUpperCase()}</div>
        </div>
        <div class="pick-conviction">
          <div class="conv-num" style="color:${convColor}">${pick.conviction || '—'}</div>
          <div class="conv-label">/10</div>
        </div>
      </div>
      <div class="pick-game">
        <span class="sport-dot" style="background:${sportColor(pick.league)}"></span>
        ${pick.game || ''} · ${pick.league || ''}
      </div>
      <div class="pick-reasoning">${pick.reasoning || ''}</div>
      <div class="pick-bottom">
        <div style="display:flex;gap:8px;align-items:center">
          ${statusHTML}
          ${pnlHTML}
        </div>
        ${clvHTML}
      </div>
    </div>`;
  }).join('');
}

loadPicks();
</script>
</body>
</html>
